#debian@debian01:~$ cat /etc/dnsmasq.conf
# =========================================================================
# GŁÓWNA KONFIGURACJA SIECIOWA
# =========================================================================
# Słuchaj TYLKO na interfejsie sieci instalacyjnej (VLAN 20)
interface=bripxe

# Wyłączamy wbudowany serwer DNS (dnsmasq nie będzie serwerem DNS w tej sieci,
# przekażemy klientom zewnętrzne DNS-y np. od Cloudflare)
port=0

# =========================================================================
# SERWER DHCP (VLAN 20)
# =========================================================================
# Zakres przydzielanych adresów IP, maska oraz czas dzierżawy (1 godzina)
dhcp-range=10.192.20.10,10.192.20.250,255.255.255.0,1h

# Opcja 3: Ustawienie bramy domyślnej dla instalowanych maszyn (Twój Wyse)
dhcp-option=option:router,10.192.20.1

# Opcja 6: Przekazanie serwerów DNS (Cloudflare i Google), aby iPXE mogło rozwiązać domenę github.io
dhcp-option=option:dns-server,1.1.1.1,8.8.8.8

# =========================================================================
# SERWER TFTP & LOGIKA PXE DLA UEFI
# =========================================================================
# Włączenie wbudowanego serwera TFTP
enable-tftp
tftp-root=/var/ftpd

# Rozpoznawanie architektury klienta (64-bit UEFI zgłasza się jako architektura 7 lub 9)
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9

# Jeśli maszyna to UEFI 64-bit, wyślij plik ipxe.efi (lub snponly.efi dla starych kart) przez TFTP
#dhcp-boot=tag:efi64,ipxe.efi
dhcp-boot=tag:efi64,snponly.efi
dhcp-boot=tag:ipxe,autoexec.ipxe
