set default="0"
set timeout=5
set hostname="testowy"
set base_url="https://raw.githubusercontent.com/marekwyrzykowski/ipxe/refs/heads/main"

set common_params="\
netcfg/get_hostname=${hostname} \
base_url=${base_url} \
DEBIAN_FRONTEND=text \
auto=true \
priority=critical \
vga=788 \
netcfg/choose_interface=auto \
netcfg/hostname_from_cmdline=true \
file=/hd-media/${distribution}/preseed.cfg"

#my_cloud_config=https://raw.githubusercontent.com/marekwyrzykowski/ipxe/refs/heads/main/${distribution}/cloud-config.dell.wyse.3040.yaml \

# ==================== UEFI USB BOOT ENTRIES ====================

menuentry "Auto installation of Debian 13 on /dev/mmcblk0" {
    search --file --set=root /debian/vmlinuz
    linux /debian/vmlinuz ${common_params} cdrom-detect/try-usb=true partman-auto/disk=/dev/mmcblk0 ---
    initrd /debian/initrd.gz
}

menuentry "Auto installation of Debian 13 on /dev/sda" {
    search --file --set=root /debian/vmlinuz
    linux /debian/vmlinuz ${common_params} cdrom-detect/try-usb=true partman-auto/disk=/dev/sda ---
    initrd /debian/initrd.gz
}

menuentry "Auto installation of Debian 13 on /dev/sdb" {
    search --file --set=root /debian/vmlinuz
    linux /debian/vmlinuz ${common_params} cdrom-detect/try-usb=true partman-auto/disk=/dev/sdb ---
    initrd /debian/initrd.gz
}
