  # - systemctl disable networking.service
  # - systemctl enable systemd-networkd.service systemd-resolved.service

  # update-initramfs is run to ensure that the initramfs includes the fix for the dw_dmac_core module
  - update-initramfs -u
  
  - sed -i "s/macaddress:\s*eth0/macaddress:\ $(cat /sys/class/net/eth0/address)/g" /etc/netplan/00-installer-config.yaml
  - netplan generate || true




# =========================================================================
# 5. REBOOT: Safe reboot to bring up the new br0 architecture
# =========================================================================
power_state:
  mode: reboot
  message: "Provisioning complete. Rebooting to apply the write_files network layout..."
  timeout: 5
  condition: true
