# Switch to text mode for debconf to avoid any interactive prompts during installation
d-i debconf/frontend string text

# =========================================================================
# 1. Language and Keyboard Configuration
# =========================================================================
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select pl

# =========================================================================
# 2. Network Configuration
# =========================================================================
d-i netcfg/choose_interface select auto
d-i netcfg/get_domain string local


# =========================================================================
# 3. Extra Modules for the Installer - enabling HTTPS support and time synchronization
# =========================================================================
d-i anna/choose_modules string ca-certificates-udeb libcrypto4-udeb libssl4-udeb rdate-udeb libbsd0-udeb libmd0-udeb


# =========================================================================
# 4. Mirror Configuration - using the default Debian mirror
# =========================================================================
d-i mirror/country string poland
d-i mirror/http/hostname string ftp.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# =========================================================================
# 5. Security Configuration (No root password and automatic user skipping)
# =========================================================================
d-i passwd/root-login boolean false
d-i passwd/root-password-crypted password !
#d-i passwd/root-password password 
#d-i passwd/root-password-again password 
# d-i passwd/root-login boolean true
# d-i passwd/root-password password a
# d-i passwd/root-password-again password a

# d-i passwd/make-user boolean false
# d-i passwd/user-fullname string temporary
# d-i passwd/username string temporary
# d-i passwd/user-password password temporary
# d-i passwd/user-password-again password temporary
d-i passwd/make-user boolean true
d-i passwd/user-fullname string System Administrator
d-i passwd/username string debian
d-i passwd/user-password-crypted password !

# =========================================================================
# 6. Timezone Configuration
# =========================================================================
d-i clock-setup/utc boolean true
d-i time/zone string UTC

# =========================================================================
# 7. Partitioning Configuration
# =========================================================================
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select custom_partitioning

d-i partman-auto/expert_recipe string \
    custom_partitioning :: \
        100 150 200 fat32 \
            $primary{ } $bootable{ } \
            method{ efi } format{ } \
        . \
        500 10000 -1 ext4 \
            $primary{ } \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } \
            mountpoint{ / } \
        .

# disable confirmation prompts for partitioning
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt
d-i partman-efi/non_efi_system boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-base/confirm boolean true
d-i partman-base/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false


# =========================================================================
# 8. Grub Bootloader Installation and Package Selection
# =========================================================================
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/force-efi-extra-removable boolean true

tasksel tasksel/first multiselect standard, ssh-server

# Install additional packages
d-i pkgsel/include string cloud-init netplan.io systemd-resolved yq
d-i pkgsel/upgrade select full-upgrade

# =========================================================================
# 9. REBOOT & POST-INSTALLATION CONFIGURATION
# =========================================================================
d-i finish-install/reboot_in_progress note

d-i preseed/late_command string \
    rdate -s time.nist.gov; \
    BASE_URL=$(sed -n 's/.*base_url=\([^ ]*\).*/\1/p' /proc/cmdline); \
    wget -O /target/etc/config-file.yaml "$BASE_URL/configs/$(hostname).yaml"; \
    in-target chmod 400 /etc/config-file.yaml; \
    DISTRIBUTION=$(in-target yq eval '.distribution' /etc/config-file.yaml); \
    CLOUD_CONFIG_FILE=$(in-target yq eval '.cloud_config_file' /etc/config-file.yaml); \
    in-target mkdir -p /var/lib/cloud/seed/nocloud-net/; \
    wget -O /target/var/lib/cloud/seed/nocloud-net/user-data "$BASE_URL/${DISTRIBUTION}/${CLOUD_CONFIG_FILE}"; \
    echo "instance-id: $(hostname)" > /target/var/lib/cloud/seed/nocloud-net/meta-data; \
    in-target systemctl disable networking.service; \
    in-target systemctl enable systemd-networkd.service systemd-resolved.service; \
    in-target sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT="/GRUB_CMDLINE_LINUX_DEFAULT="net.ifnames=0 biosdevname=0 /' /etc/default/grub; \
    in-target update-grub
